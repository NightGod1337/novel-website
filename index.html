<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>

        }

        .navbar {

            color: #2c3e50;

        }
        .visitor-count i {

        }

        .hero {

<script>
    // ================= 小说读取模块 =================
    // 无需任何命名格式限制！自动读取 novels 文件夹下所有 .txt 文件
    // 文件名可以是任意内容，如：第一章.txt、夺妻为后-序章.txt、1.txt 等
    
    const NOVELS_FOLDER = "novels/";
    let chaptersList = [];      // [{ filename: "xxx.txt", displayName: "显示名称" }]
    let currentChapterIndex = 0;
    let chapterContentsCache = {}; // 缓存章节内容
    
    // 从文件名生成友好的显示名称（自动去除 .txt 后缀）
    function getDisplayNameFromFilename(filename) {
        // 去掉 novels/ 前缀和 .txt 后缀
        let name = filename.replace(NOVELS_FOLDER, '').replace(/\.txt$/i, '');
        // 如果文件名太长就截取前30个字符
        if (name.length > 35) {
            name = name.substring(0, 32) + '...';
        }
        return name;
    }
    
    // 核心：通过 fetch 尝试获取 novels 文件夹下的文件列表
    // 由于前端无法直接列出目录，我们采用智能探测 + 用户可配置的方式
    // 方案：使用一个 manifest.json 文件（推荐）或让用户手动指定章节列表
    // 为了让用户体验最好，这里提供两种方式：
    // 1. 如果存在 novels/manifest.json，则读取其中配置
    // 2. 否则自动探测（预设常见命名模式）+ 提供一个手动添加的机制
    
    // 方式1：读取 manifest.json（最推荐，完全自由命名）
    async function loadFromManifest() {
        try {
            const response = await fetch(`${NOVELS_FOLDER}manifest.json`);
            if (response.ok) {
                const manifest = await response.json();
                if (manifest.chapters && Array.isArray(manifest.chapters)) {
                    chaptersList = manifest.chapters.map(ch => ({
                        filename: `${NOVELS_FOLDER}${ch.file}`,
                        displayName: ch.title || getDisplayNameFromFilename(ch.file)
                    }));
                    return true;
                }
            }
        } catch (e) {
            // manifest 不存在，继续尝试其他方式
        }
        return false;
    }
    
    // 方式2：自动探测常用命名模式（1.txt, 一.txt, 第一章.txt, 夺妻为后1.txt 等）
    async function autoDetectChapters() {
        // 常见的探测模式列表
        const testPatterns = [
            "1.txt", "一.txt", "第一章.txt", "第1章.txt",
            "夺妻为后1.txt", "夺妻为后-1.txt", "夺妻为后_1.txt",
            "chapter1.txt", "ch1.txt"
        ];
        
        let detected = [];
        
        for (let i = 0; i < testPatterns.length; i++) {
            const pattern = testPatterns[i];
            const filename = `${NOVELS_FOLDER}${pattern}`;
            try {
                const response = await fetch(filename, { method: 'HEAD' });
                if (response.ok) {
                    detected.push({
                        filename: filename,
                        displayName: getDisplayNameFromFilename(filename)
                    });
                }
            } catch (e) {}
        }
        
        // 如果探测到了，按文件名排序
        if (detected.length > 0) {
            detected.sort((a, b) => a.filename.localeCompare(b.filename));
            chaptersList = detected;
            return true;
        }
        
        return false;
    }
    
    // 方式3：提示用户创建 manifest.json（最可靠）
    async function scanChapters() {
        const container = document.getElementById('chapterLinksContainer');
        container.innerHTML = '<span class="chapter-link loading">正在扫描 novels 文件夹...</span>';
        
        // 优先尝试 manifest.json
        let success = await loadFromManifest();
        
        if (!success) {
            success = await autoDetectChapters();
        }
        
        if (!success || chaptersList.length === 0) {
            container.innerHTML = `
                <div style="width:100%; padding:0.5rem 0;">
                    <span style="color:#b48c5c;">📁 未检测到章节文件</span>
                    <div style="font-size:0.75rem; color:#aa8b6e; margin-top:8px;">
                        <strong>📖 方法一（推荐）：</strong> 在 novels 文件夹中创建 manifest.json 文件<br>
                        <code style="background:#f0e7dc; padding:4px 8px; display:inline-block; margin:4px 0;">{
  "chapters": [
    {"file": "第一章.txt", "title": "第一章 · 棋子入局"},
    {"file": "第二章.txt", "title": "第二章 · 棋子的觉醒"}
  ]
}</code><br>
                        <strong>📄 方法二：</strong> 将任意 .txt 文件放入 novels 文件夹<br>
                        <strong>🌐 重要：</strong> 部署到 GitHub Pages 或本地服务器后即可正常读取
                    </div>
                </div>
            `;
            return false;
        }
        
        // 渲染章节链接
        container.innerHTML = '';
        chaptersList.forEach((ch, idx) => {
            const link = document.createElement('span');
            link.className = 'chapter-link';
            link.setAttribute('data-index', idx);
            link.innerText = ch.displayName;
            link.addEventListener('click', (e) => {
                e.stopPropagation();
                openNovelReader(idx);
            });
            container.appendChild(link);
        });
        
        return true;
    }
    
    // 加载章节内容
    async function loadChapterContent(index) {
        if (index < 0 || index >= chaptersList.length) {
            return `<div class="error-placeholder">❌ 章节不存在</div>`;
        }
        
        if (chapterContentsCache[index]) {
            return chapterContentsCache[index];
        }
        
        const chapter = chaptersList[index];
        
        try {
            const response = await fetch(chapter.filename);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const text = await response.text();
            
            // 格式化文本为 HTML
            let formatted = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n\n+/g, '</p><p>  ')
                .replace(/\n/g, '</p><p>  ');
            
            formatted = `<p>  ${formatted}</p>`.replace(/<p>\s*<\/p>/g, '');
            
            const fullContent = `
                <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1.5rem;">
                    <span style="background:#c96f3e; color:white; padding:0.2rem 1rem; border-radius:30px; font-size:0.8rem;">${chapter.displayName}</span>
                </div>
                ${formatted}
                <p style="text-align:right; margin-top:1.5rem;">—— ${chapter.displayName} 完 ——</p>
            `;
            
            chapterContentsCache[index] = fullContent;
            return fullContent;
        } catch (error) {
            console.error('加载失败:', error);
            return `<div class="error-placeholder">⚠️ 加载失败：${chapter.filename}<br>请确保文件存在且为 UTF-8 编码</div>`;
        }
    }
    
    // 打开阅读器
    async function openNovelReader(index = null) {
        const modal = document.getElementById('readerModal');
        if (!modal) return;
        
        if (chaptersList.length === 0) {
            showToast('暂无可用章节，请先在 novels 文件夹中添加 .txt 文件');
            return;
        }
        
        if (index === null) {
            index = 0;
        }
        
        currentChapterIndex = index;
        
        const contentEl = document.getElementById('readerContent');
        contentEl.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> 加载章节内容...</div>';
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        await renderReaderWithChapter(currentChapterIndex);
    }
    
    async function renderReaderWithChapter(index) {
        const contentEl = document.getElementById('readerContent');
        const titleEl = document.getElementById('readerTitle');
        titleEl.innerText = '夺妻为后';
        
        // 生成章节选择器
        let selectorHtml = '<div class="chapter-selector">';
        for (let i = 0; i < chaptersList.length; i++) {
            const activeClass = (i === index) ? 'active' : '';
            selectorHtml += `<button class="chapter-btn ${activeClass}" data-index="${i}">${chaptersList[i].displayName}</button>`;
        }
        selectorHtml += '</div>';
        
        const chapterContent = await loadChapterContent(index);
        contentEl.innerHTML = selectorHtml + chapterContent;
        
        // 绑定切换事件
        document.querySelectorAll('.chapter-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                if (!isNaN(idx) && idx !== currentChapterIndex) {
                    currentChapterIndex = idx;
                    contentEl.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> 加载章节内容...</div>';
                    await renderReaderWithChapter(currentChapterIndex);
                }
            });
        });
    }
    
    // ================= 历史访问人数 =================
    function initVisitorCount() {
        let count = localStorage.getItem('site_visitor_count');
        if (count === null) count = 1;
        else count = parseInt(count) + 1;
        localStorage.setItem('site_visitor_count', count);
        document.getElementById('visitorCountDisplay').innerHTML = `<i class="fas fa-users"></i> 总访问 ${count} 人次`;
    }
    
    // ================= 评论功能 =================
    let comments = [];
    
    function loadComments() {
        const stored = localStorage.getItem('novel_comments');
        if (stored) comments = JSON.parse(stored);
        else comments = [];
        renderComments();
    }
    
    function renderComments() {
        const container = document.getElementById('commentsList');
        if (!container) return;
        if (comments.length === 0) {
            container.innerHTML = '<div class="empty-comments">✨ 暂无留言，来做第一个留言的人吧 ✨</div>';
            return;
        }
        container.innerHTML = comments.slice().reverse().map(c => `
            <div class="comment-item">
                <div class="comment-name">
                    <span><i class="fas fa-user-circle"></i> ${escapeHtml(c.name)}</span>
                    <span class="comment-time">${c.time}</span>
                </div>
                <div class="comment-text">${escapeHtml(c.text)}</div>
            </div>
        `).join('');
    }
    
    function addComment(name, text) {
        if (!text.trim()) {
            showToast('请填写留言内容~');
            return false;
        }
        const comment = {
            id: Date.now(),
            name: name.trim() === '' ? '匿名读者' : name.trim().substring(0, 30),
            text: text.trim().substring(0, 500),
            time: new Date().toLocaleString('zh-CN')
        };
        comments.push(comment);
        localStorage.setItem('novel_comments', JSON.stringify(comments));
        downloadCommentsAsTxt();
        renderComments();
        showToast('留言已保存，感谢分享 ~');
        return true;
    }
    
    function downloadCommentsAsTxt() {
        if (comments.length === 0) return;
        let content = `仲南莲的私人网站 - 读者留言记录\n生成时间：${new Date().toLocaleString('zh-CN')}\n`;
        content += `========================================\n`;
        comments.forEach((c, idx) => {
            content += `[${idx+1}] ${c.time} | ${c.name} :\n${c.text}\n----------------------------------------\n`;
        });
        const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `comments_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function closeReader() {
        const modal = document.getElementById('readerModal');
        if (modal) { modal.style.display = 'none'; document.body.style.overflow = ''; }
    }
    
    // ================= 初始化 =================
    async function init() {
        initVisitorCount();
        loadComments();
        
        const hasChapters = await scanChapters();
        
        const mainCard = document.getElementById('novelMainCard');
        if (mainCard) {
            if (hasChapters && chaptersList.length > 0) {
                mainCard.addEventListener('click', () => openNovelReader(0));
            } else {
                mainCard.style.opacity = '0.6';
                mainCard.style.cursor = 'not-allowed';
            }
        }
        
        const submitBtn = document.getElementById('submitCommentBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                const nameInput = document.getElementById('commentName');
                const textInput = document.getElementById('commentText');
                addComment(nameInput.value, textInput.value);
                if (textInput) textInput.value = '';
            });
        }
        
        const closeBtn = document.getElementById('closeReaderBtn');
        if (closeBtn) closeBtn.addEventListener('click', closeReader);
        const modalBg = document.getElementById('readerModal');
        if (modalBg) modalBg.addEventListener('click', (e) => { if (e.target === modalBg) closeReader(); });
    }
    
    init();
</script>
